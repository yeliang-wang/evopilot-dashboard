services:
  evopilot-dashboard:
    build: .
    image: evopilot-dashboard:prod-main
    ports:
      - "${EVOPILOT_DASHBOARD_PORT:-8080}:8080"
    environment:
      EVOPILOT_API_BASE_URL: "${EVOPILOT_API_BASE_URL:-http://evopilot-server:19876}"
    networks:
      - evopilot-control-plane
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  evopilot-control-plane:
    name: "${EVOPILOT_DOCKER_NETWORK:-evopilot_default}"
    external: true
